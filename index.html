<body>
<div id="app"><div class="spin">loading the Bhāgavatam…</div></div>

<script src="sql-wasm.js"></script>
<script src="normalize.js"></script>
<script src="app.js"></script>
<!-- dev: keep the service worker OFF and self-heal any stale cache so code changes show immediately -->
<script>
(async()=>{
  let had=false;
  if('serviceWorker' in navigator){const rs=await navigator.serviceWorker.getRegistrations();for(const r of rs){await r.unregister();had=true;}}
  if(window.caches){const ks=await caches.keys();if(ks.length)had=true;await Promise.all(ks.map(k=>caches.delete(k)));}
  if(had && !sessionStorage.getItem('swpurged')){sessionStorage.setItem('swpurged','1');location.reload();}
})();
</script>
</body>
