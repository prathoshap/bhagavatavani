<!-- Production web (real https host): register the service worker → offline + instant repeat loads.
     Dev (localhost) and the native apps (capacitor:// or https://localhost): keep it OFF and
     self-heal any stale cache so code changes always show immediately. -->
<script>
(async()=>{
  if(!('serviceWorker' in navigator)) return;
  const prod = location.protocol==='https:' && location.hostname!=='localhost' && location.hostname!=='127.0.0.1';
  if(prod){ try{ await navigator.serviceWorker.register('sw.js'); }catch(e){} return; }
  for(const r of await navigator.serviceWorker.getRegistrations()) r.unregister();
  if(window.caches){ for(const k of await caches.keys()) caches.delete(k); }
})();
</script>
